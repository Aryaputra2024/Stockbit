<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Stockbit Replika</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .sb-green { color: #00d265; }
        .bg-sb-green { background-color: #00d265; }
        .bg-sb-green:hover { background-color: #00b356; }
    </style>
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">

    <div class="w-full max-w-md p-8">
        <div class="flex justify-center mb-8">
            <div class="text-3xl font-bold sb-green">
                stockbit<span class="text-gray-800">.</span>
            </div>
        </div>

        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
            <h2 class="text-2xl font-semibold text-gray-800 mb-6 text-center">Log In</h2>
            
            <form action="#" method="POST">
                <div class="mb-4">
                    <label class="block text-sm font-medium text-gray-600 mb-2">Username or Email</label>
                    <input type="text" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-400 focus:border-transparent outline-none transition"
                           placeholder="Username atau Email">
                </div>

                <div class="mb-6">
                    <div class="flex justify-between mb-2">
                        <label class="text-sm font-medium text-gray-600">Password</label>
                        <a href="#" class="text-sm sb-green hover:underline">Lupa Password?</a>
                    </div>
                    <input type="password" 
                           class="w-full px-4 py-3 rounded-lg border border-gray-300 focus:ring-2 focus:ring-green-400 focus:border-transparent outline-none transition"
                           placeholder="Password">
                </div>

                <button type="submit" 
                        class="w-full bg-sb-green text-white font-semibold py-3 rounded-lg transition duration-200 shadow-md">
                    Login
                </button>
            </form>

            <div class="relative my-8">
                <div class="absolute inset-0 flex items-center">
                    <div class="w-full border-t border-gray-200"></div>
                </div>
                <div class="relative flex justify-center text-sm">
                    <span class="px-2 bg-white text-gray-500">Atau masuk dengan</span>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button class="flex items-center justify-center py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    <img src="https://www.svgrepo.com/show/355037/google.svg" class="w-5 h-5 mr-2" alt="Google">
                    <span class="text-sm font-medium">Google</span>
                </button>
                <button class="flex items-center justify-center py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">
                    <img src="https://www.svgrepo.com/show/448224/facebook.svg" class="w-5 h-5 mr-2" alt="Facebook">
                    <span class="text-sm font-medium">Facebook</span>
                </button>
            </div>
        </div>

        <p class="text-center mt-8 text-gray-600 text-sm">
            Belum punya akun? <a href="#" class="sb-green font-semibold hover:underline">Daftar Sekarang</a>
        </p>
    </div>

</body>
</html>
